# Liite 2: Pääpiirustustasoisten suunnitelma- ja toteumamallien sijainti-, tila- ja komponenttitiedot
# Per Ympäristöministeriön asetus 1340/2025
# x = merkittävä jos tieto on (conditional/optional)
# Names aligned with Ryhti raklu data model v1.1.0

categories:
  sijainti:
    name_fi: "Sijainti"
    name_en: "Location"
    ryhti_class: "Sijainti"
    icon: "map"
    ifc_entity: "IfcSite"
    fields:
      - id: "koordinaattijarjestelma"
        name_fi: "ETRS89 koordinaattijärjestelmä"
        name_en: "ETRS89 Coordinate System"
        required: true
        ifc_property: "Pset_SiteCommon.CoordinateSystem"
        default_value: "ETRS-TM35FIN"
        ryhti_property: "koordinaattijarjestelma"
      - id: "itakoordinaatti"
        name_fi: "Itäkoordinaatti"
        name_en: "Easting"
        required: true
        value_type: "float"
        note: "IFC-mallin origo"
        ifc_property: "IfcSite.RefLongitude"
        ryhti_property: "itakoordinaatti"
      - id: "pohjoiskoordinaatti"
        name_fi: "Pohjoiskoordinaatti"
        name_en: "Northing"
        required: true
        value_type: "float"
        note: "IFC-mallin origo"
        ifc_property: "IfcSite.RefLatitude"
        ryhti_property: "pohjoiskoordinaatti"
      - id: "korkeuskoordinaattijarjestelma"
        name_fi: "Korkeuskoordinaattijärjestelmä"
        name_en: "Height Coordinate System"
        required: true
        ifc_property: "Pset_SiteCommon.HeightSystem|FI_Kiinteistö.Korkojärjestelmä"
